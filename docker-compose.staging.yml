# Docker-Compose fuer die STAGE-Site (parallel zur Dev).
#
# Starte mit:
#   docker compose -p dhps-stage -f docker-compose.staging.yml up -d
#
# Stoppen mit:
#   docker compose -p dhps-stage -f docker-compose.staging.yml down
#
# Port-Schema (gemaess docs/architecture/24-DEV-STRECKE-PLAN-v0160.md Sektion 3.5):
#   WordPress Stage:   http://localhost:8086
#   phpMyAdmin Stage:  http://localhost:8087
#   Dev laeuft parallel auf 8082 (WP) und 8083 (PMA) - keine Kollision.
#
# HINWEIS: Plan-Doc nennt urspruenglich 8084/8085. Auf diesem Entwickler-Host
# sind 8084/8085 bereits durch andere Docker-Projekte belegt (opengov-*).
# Lead-Decision v0.16.0: Wechsel auf 8086/8087, Plan-Doc + Checkliste angepasst.
#
# Project-Name `dhps-stage` (via -p Flag) trennt Container/Netz von Dev.
# Volumes (wp_data_stage, db_data_stage) und DB-Namen (wordpress_stage, wp_user_stage)
# sind explizit getrennt vom Dev-Stack.
#
# Plugin-Mount teilt sich das Source-Directory mit Dev (Trust-Decision T16):
# Code-Aenderungen wirken sofort in beiden Stacks. Die ZIP-Update-Pipeline wird
# getrennt via "Aktualisieren" im WP-Admin getestet (siehe docs/team-knowledge/07-RELEASE-CHECKLIST.md).

services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    volumes:
      - db_data_stage:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_pass_stage_2025
      MYSQL_DATABASE: wordpress_stage
      MYSQL_USER: wp_user_stage
      MYSQL_PASSWORD: wp_pass_stage_2025
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass_stage_2025"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    ports:
      - "8086:80"
    volumes:
      - wp_data_stage:/var/www/html
      - .:/var/www/html/wp-content/plugins/wp-deubner-hp-services
      - ./docker/deubner-theme:/var/www/html/wp-content/themes/deubner-demo
      # Stage-Marker mu-plugin (seit v0.16.3, P1+P2)
      # Aktiviert nur in Stage weil DHPS_ENV_LABEL='STAGE' Pflicht-Konstante ist.
      - ./docker/stage-mu-plugins:/var/www/html/wp-content/mu-plugins
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress_stage
      WORDPRESS_DB_USER: wp_user_stage
      WORDPRESS_DB_PASSWORD: wp_pass_stage_2025
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', true);
        // Visueller Marker zur Unterscheidung von Dev (siehe TD6 in v0.16.0 Plan).
        define('DHPS_ENV_LABEL', 'STAGE');
    depends_on:
      db:
        condition: service_healthy

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "8087:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root_pass_stage_2025
    depends_on:
      - db

volumes:
  wp_data_stage:
  db_data_stage:
